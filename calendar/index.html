<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Calendar</title>
  <link rel="stylesheet" href="calendar.css?v=7">
</head>
<body>

  <!-- ═══════════════════════════ HEADER -->
  <div id="hdr">
    <div class="brand">
      <div class="brand-icon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="white">
          <rect x="1" y="4" width="14" height="11" rx="2"/>
          <rect x="4" y="1" width="2" height="5" rx="1"/>
          <rect x="10" y="1" width="2" height="5" rx="1"/>
          <rect x="3" y="8" width="2" height="2" rx=".4"/>
          <rect x="7" y="8" width="2" height="2" rx=".4"/>
          <rect x="11" y="8" width="2" height="2" rx=".4"/>
          <rect x="3" y="11" width="2" height="2" rx=".4"/>
          <rect x="7" y="11" width="2" height="2" rx=".4"/>
        </svg>
      </div>
      Content Calendar
    </div>

    <span id="sync-status" class="sync-pill sync-off" title="">Local only</span>

    <div class="nav-cluster">
      <button class="ibtn" id="prev-btn">‹</button>
      <button class="ibtn" id="today-btn">Today</button>
      <button class="ibtn" id="next-btn">›</button>
      <span id="period-lbl"></span>
    </div>

    <div class="sep"></div>

    <div class="vtoggle">
      <button class="vtbtn on" data-view="month">Month</button>
      <button class="vtbtn"    data-view="week">Week</button>
    </div>

    <button class="ibtn" id="backup-btn" title="Backup, share & activity log" style="font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M8 1v8M8 9 5 6M8 9l3-3"/><path d="M2 11v2a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-2"/>
      </svg>
      Backup
    </button>

    <button id="new-btn">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M6 1v10M1 6h10" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
      New post
    </button>
  </div>

  <!-- ═══════════════════════════ CAMPAIGN BAR -->
  <div id="cbar">
    <!-- pills injected by JS -->
    <button id="camp-btn">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="6" cy="6" r="5"/>
        <circle cx="6" cy="6" r="2"/>
      </svg>
      Campaigns
    </button>
  </div>

  <!-- ═══════════════════════════ CALENDAR -->
  <div id="cal-wrap">
    <div id="cal"></div>
  </div>

  <!-- ═══════════════════════════ POST MODAL -->
  <div class="overlay" id="post-ov">
    <div class="modal" id="post-modal">
      <div class="mhdr">
        <span class="mhdr-title" id="post-modal-ttl">New post</span>
        <button class="mclose" id="post-modal-x">×</button>
      </div>
      <div class="mbody" id="post-modal-body"></div>
      <div class="mftr"  id="post-modal-ftr"></div>
    </div>
  </div>

  <!-- ═══════════════════════════ CAMPAIGN MODAL -->
  <div class="overlay" id="camp-ov">
    <div class="modal" style="width:440px">
      <div class="mhdr">
        <span class="mhdr-title">Manage campaigns</span>
        <button class="mclose" id="camp-modal-x">×</button>
      </div>
      <div class="mbody" id="camp-modal-body"></div>
    </div>
  </div>

  <!-- ═══════════════════════════ BACKUP / SYNC MODAL -->
  <div class="overlay" id="backup-ov">
    <div class="modal" style="width:520px">
      <div class="mhdr">
        <span class="mhdr-title">Backup &amp; share</span>
        <button class="mclose" id="backup-modal-x">×</button>
      </div>
      <div class="mbody" id="backup-modal-body"></div>
    </div>
  </div>

  <!-- ═══════════════════════════ UTILITIES -->
  <div id="toast"></div>
  <div id="dupe-tip">⌥ Duplicate</div>

  <!-- Supabase client library (for the optional shared calendar) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="supabase.js?v=7"></script>
  <script src="app.js?v=7"></script>
</body>
</html>
